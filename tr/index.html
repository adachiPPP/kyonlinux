<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kyon linux</title>
    <style>
        html {
            background: #0a0f1d;
        }
        body {
            font-family: monospace;
            color: #00d2ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
            background: transparent;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../icon.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 250px;
            opacity: 0.45;
            z-index: -1;
        }
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-switcher a {
            color: #4a6984;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid #1e2d4a;
            padding: 5px 10px;
        }
        .lang-switcher a:hover {
            color: #00d2ff;
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }
        h1 {
            font-size: 4rem;
            letter-spacing: -2px;
            margin-bottom: 0;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
        }
        p {
            font-size: 1.2rem;
            color: #5f7e97;
            margin-top: 10px;
            max-width: 600px;
            line-height: 1.6;
            text-align: center;
        }
        .btn {
            display: inline-block;
            border: 1px solid #00d2ff;
            color: #00d2ff;
            padding: 15px 30px;
            text-decoration: none;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn:hover {
            background: #00d2ff;
            color: #0a0f1d;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.8);
        }
    </style>
</head>
<body>
    <div class="lang-switcher">
        <a href="../">EN</a>
    </div>
    <h1>kyon linux</h1>
    <p>yeni baslayanlar icin kullanim kolayligina ve estetik tasarima odaklanan, bagimsiz debian tabanli bir linux dagitimi.</p>
    <a href="#" class="btn">iso indir! (cok yakinda!!!!)</a>
</body>
</html>
