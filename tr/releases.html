<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyon Linux - Notes</title>
    <style>
        html {
            background: linear-gradient(135deg, #000b47 0%, #00d2ff 100%);
            min-height: 100vh;
        }
        body {
            font-family: monospace;
            color: #00d2ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            position: relative;
            background: transparent;
            padding: 100px 20px 40px 20px;
            box-sizing: border-box;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('icon.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 250px;
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }
        .top-left-nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .top-left-nav a {
            color: #4a6984;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid #1e2d4a;
            padding: 5px 10px;
        }
        .top-left-nav a:hover {
            color: #00d2ff;
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }
        .top-right-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .top-right-nav a {
            color: #4a6984;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid #1e2d4a;
            padding: 5px 10px;
        }
        .top-right-nav a:hover {
            color: #00d2ff;
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }
        h1 {
            font-size: 3rem;
            letter-spacing: -1px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            text-align: center;
        }
        #releases-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .release {
            border: 1px solid #1e2d4a;
            background: rgba(0, 11, 71, 0.4);
            padding: 20px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .release:hover {
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }
        h2 {
            margin-top: 0;
            color: #00d2ff;
            font-size: 1.2rem;
            border-bottom: 1px dashed #1e2d4a;
            padding-bottom: 8px;
        }
        ul {
            margin: 10px 0 0 0;
            padding-left: 20px;
            color: #3ca9d4; /* slightly darker cyber blue for readability */
        }
        li {
            line-height: 1.6;
            margin-bottom: 8px;
        }
        li::marker {
            color: #00d2ff;
        }
    </style>
</head>
<body>
    <div class="top-left-nav">
        <a href="./index.html">Home</a>
    </div>
    <div class="top-right-nav">
        <a href="./gallery.html">Gallery</a>
    </div>

    <h1>Developing Notes</h1>
    <div id="releases-container"></div>

    <script>
        fetch('notes.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('releases-container');
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'release';
                    
                    const listItems = item.changes.map(change => `<li>${change}</li>`).join('');
                    
                    div.innerHTML = `
                        <h2>${item.date}</h2>
                        <ul>${listItems}</ul>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(err => console.error('error loading updates', err));
    </script>
</body>
</html>
