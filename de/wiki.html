<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyon Linux - Wiki</title>
    <style>
        html {
            background: linear-gradient(135deg, #000b47 0%, #00d2ff 100%);
            min-height: 100vh;
        }
        body {
            font-family: monospace;
            color: #00d2ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            position: relative;
            background: transparent;
            padding: 100px 20px 40px 20px;
            box-sizing: border-box;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('icon.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 250px;
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }
        .top-left-nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .top-left-nav a {
            color: #4a6984;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid #1e2d4a;
            padding: 5px 10px;
        }
        .top-left-nav a:hover {
            color: #00d2ff;
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }
        .top-right-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .top-right-nav a {
            color: #4a6984;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid #1e2d4a;
            padding: 5px 10px;
        }
        .top-right-nav a:hover {
            color: #00d2ff;
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }
        h1 {
            font-size: 3rem;
            letter-spacing: -1px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            text-align: center;
        }
        #wiki-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-wrap: wrap;
            flex-direction: row;
            gap: 15px;
            justify-content: center;
        }
        .wiki-entry {
            border: 1px solid #1e2d4a;
            background: rgba(0, 11, 71, 0.4);
            border-radius: 4px;
            transition: 0.3s;
            overflow: hidden;
            width: calc((100% - 30px) / 3);
            box-sizing: border-box;
            align-self: flex-start;
        }
        .wiki-entry:hover {
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }
        .wiki-header {
            margin: 0;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background: rgba(0, 0, 0, 0.1);
            gap: 15px;
        }
        .wiki-date {
            color: #4a6984;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .wiki-title {
            color: #00d2ff;
            font-weight: bold;
            flex-grow: 1;
            text-align: left;
        }
        .wiki-trigger {
            color: #4a6984;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .wiki-entry.active .wiki-trigger {
            color: #00d2ff;
        }
        .wiki-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
            padding: 0 20px;
        }
        .wiki-entry.active .wiki-content {
            max-height: 1000px;
            padding: 15px 20px 20px 20px;
            border-top: 1px dashed #1e2d4a;
        }
        ul {
            margin: 0;
            padding-left: 20px;
            color: #3ca9d4;
        }
        li {
            line-height: 1.6;
            margin-bottom: 8px;
        }
        li:last-child {
            margin-bottom: 0;
        }
        li::marker {
            color: #00d2ff;
        }
        /* blank/spacer lines (from a " " entry in the json) render as a gap, no bullet */
        li.wiki-spacer {
            list-style: none;
            margin: 0 0 8px 0;
            padding: 0;
            height: 0.6em;
        }
        li.wiki-spacer::marker {
            content: none;
        }
        /* lines prefixed with @! render as plain text, no bullet */
        li.wiki-nobullet {
            list-style: none;
        }
        li.wiki-nobullet::marker {
            content: none;
        }

        @media (max-width: 768px) {
            body {
                padding-top: 160px;
            }
            .top-left-nav {
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                width: calc(100% - 40px);
                display: flex;
                justify-content: center;
            }
            .top-left-nav a {
                flex: 1;
                text-align: center;
            }
            .top-right-nav {
                top: 75px;
                left: 20px;
                right: 20px;
                justify-content: center;
            }
            .top-right-nav a {
                flex: 1;
                text-align: center;
            }
            h1 {
                font-size: 2.2rem;
            }
            #wiki-container {
                max-width: 600px;
            }
            .wiki-entry {
                width: 100%;
            }
            .wiki-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .wiki-trigger {
                align-self: flex-end;
                margin-top: -20px;
            }
        }
    </style>
</head>
<body>
    <div class="top-left-nav">
        <a href="./index.html">home</a>
    </div>
    <div class="top-right-nav">
        <a href="./gallery.html">gallery</a>
        <a href="./releases.html">dev notes</a>
    </div>

    <h1>wiki & asked questions</h1>
    <div id="wiki-container"></div>

    <script>
        // minimal HTML escaper so raw text content doesn't get interpreted as markup
        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        fetch('wiki.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('wiki-container');

                data.forEach(item => {
                    const entryDiv = document.createElement('div');
                    entryDiv.className = 'wiki-entry';

                    const rawHeader = item.header || '';
                    const lines = item.paragraph || item.changes || [];

                    const listItems = lines.map(line => {
                        // a blank/whitespace-only line is treated as a spacer, not a bulleted item
                        if (line.trim() === '') {
                            return `<li class="wiki-spacer"></li>`;
                        }

                        // a line prefixed with @! drops its bullet and renders as plain text
                        let content = line;
                        let noBullet = false;
                        if (content.trimStart().startsWith('@!')) {
                            noBullet = true;
                            content = content.trimStart().slice(2).trimStart();
                        }

                        // support \n inside a single line entry as a line break
                        const withBreaks = escapeHtml(content).replace(/\\n|\n/g, '<br>');
                        const cssClass = noBullet ? ' class="wiki-nobullet"' : '';
                        return `<li${cssClass}>${withBreaks}</li>`;
                    }).join('');

                    entryDiv.innerHTML = `
                        <div class="wiki-header">
                            <span class="wiki-title">${rawHeader}</span>
                            <span class="wiki-date">${item.date}</span>
                            <span class="wiki-trigger">[open]</span>
                        </div>
                        <div class="wiki-content">
                            <ul>${listItems}</ul>
                        </div>
                    `;

                    const header = entryDiv.querySelector('.wiki-header');
                    const trigger = entryDiv.querySelector('.wiki-trigger');

                    header.addEventListener('click', () => {
                        const isExpanded = entryDiv.classList.toggle('active');
                        trigger.textContent = isExpanded ? '[close]' : '[open]';
                    });

                    container.appendChild(entryDiv);
                });
            })
            .catch(err => console.error('error parsing external asset configuration', err));
    </script>
</body>
</html>
