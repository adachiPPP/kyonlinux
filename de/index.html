<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyon Linux</title>
    <style>
        html {
            background: linear-gradient(135deg, #000b47 0%, #00d2ff 100%);
        }
        body {
            font-family: monospace;
            color: #fffff0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
            background: transparent;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('icon.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 250px;
            opacity: 0.30;
            z-index: -1;
        }
        .top-left-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        .top-left-nav a {
            color: #4a6984;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid #1e2d4a;
            padding: 5px 10px;
        }
        .top-left-nav a:hover {
            color: #00d2ff;
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }
        .top-right-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .top-right-nav a {
            color: #4a6984;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid #1e2d4a;
            padding: 5px 10px;
        }
        .top-right-nav a:hover {
            color: #00d2ff;
            border-color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
        }
        h1 {
            font-size: 4rem;
            letter-spacing: -2px;
            margin-bottom: 0;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            text-align: center;
        }
        p {
            font-size: 1.2rem;
            color: #fffff0;
            margin-top: 10px;
            max-width: 600px;
            line-height: 1.6;
            text-align: center;
        }
        .btn {
            display: inline-block;
            border: 1px solid #00d2ff;
            color: #00d2ff;
            padding: 15px 30px;
            text-decoration: none;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn:hover {
            background: #00d2ff;
            color: #0a0f1d;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.8);
        }

        /* mobile fixes */
        @media (max-width: 600px) {
            body {
                height: auto;
                min-height: 100vh;
                justify-content: flex-start;
                padding: 170px 20px 40px 20px;
                box-sizing: border-box;
                overflow-y: auto;
            }
            .top-left-nav {
                position: absolute;
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                width: calc(100% - 40px);
                justify-content: center;
                flex-wrap: wrap;
            }
            .top-left-nav a {
                flex: 1 1 auto;
                text-align: center;
                box-sizing: border-box;
                font-size: 0.9rem;
            }
            .top-right-nav {
                position: absolute;
                top: 100px;
                left: 20px;
                right: 20px;
                justify-content: center;
                gap: 8px;
            }
            .top-right-nav a {
                flex: 1;
                text-align: center;
                font-size: 0.9rem;
                padding: 5px 2px;
            }
            h1 {
                font-size: 2.8rem;
                margin-top: 20px;
            }
            p {
                font-size: 1rem;
                padding: 0 10px;
            }
            .btn {
                width: 100%;
                box-sizing: border-box;
                text-align: center;
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
