<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kyon linux</title>
    <style>
        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #00ff9d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-switcher a {
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            border: 1px solid #333;
            padding: 5px 10px;
        }
        .lang-switcher a:hover {
            color: #00ff9d;
            border-color: #00ff9d;
        }
        h1 {
            font-size: 4rem;
            letter-spacing: -2px;
            margin-bottom: 0;
            text-shadow: 0 0 10px #00ff9d;
        }
        p {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
        }
        .btn {
            display: inline-block;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 15px 30px;
            text-decoration: none;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn:hover {
            background: #00ff9d;
            color: #0d0d0d;
            box-shadow: 0 0 20px #00ff9d;
        }
    </style>
</head>
<body>
    <div class="lang-switcher">
        <a href="./tr/">TR</a>
    </div>
    <h1>kyon linux</h1>
    <p>an indie debian based distro that focuses on ease of use for beginners.</p>
    <a href="#" class="btn">download iso! (coming really soon!!!!)</a>
</body>
</html>
